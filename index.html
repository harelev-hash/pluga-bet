<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pluga Bet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>בדוק את עצמך</h1>
            <p class="question">האם אתה יונתי?</p>
            
            <div class="input-section">
                <div class="button-group">
                    <button class="choice-btn yes-btn" onclick="checkAnswer('yes')">כן</button>
                    <button class="choice-btn no-btn" onclick="checkAnswer('no')">לא</button>
                </div>
            </div>
            
            <div id="result" class="result hidden"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
