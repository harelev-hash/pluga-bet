<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pluga Bet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Pluga Bet - בדוק את עצמך!</h1>
            <p class="question">האם אתה יונתי?</p>
            <p class="hint">👇 תשובותך נשמרות בקובץ ותראה את הסטטיסטיקה למטה</p>
            
            <div class="input-section">
                <div class="button-group">
                    <button class="choice-btn yes-btn" id="yesBtn" onclick="checkAnswer('yes')">כן</button>
                    <button class="choice-btn no-btn" id="noBtn" onclick="checkAnswer('no')">לא</button>
                </div>
            </div>
            
            <div id="result" class="result hidden"></div>
            <div id="loading" class="loading hidden">שומר לקובץ...</div>
        </div>

        <div class="stats-card">
            <h2>סטטיסטיקה</h2>
            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-label">סה"כ תשובות:</span>
                    <span class="stat-value" id="totalStats">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">כן:</span>
                    <span class="stat-value stat-yes" id="yesStats">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">לא:</span>
                    <span class="stat-value stat-no" id="noStats">-</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
